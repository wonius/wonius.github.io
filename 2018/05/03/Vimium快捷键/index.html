        <h2 id="常用快捷键"><a href="#常用快捷键" class="headerlink" title="常用快捷键"></a>常用快捷键</h2><figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">向下<span class="regexp">/上/</span>左<span class="regexp">/右移动  j/</span>k<span class="regexp">/h/</span>l</span><br><span class="line">向下<span class="regexp">/上跳动  d/u</span></span><br><span class="line">回到顶<span class="regexp">/尾部  gg/</span>G</span><br><span class="line">窗口打开模式 本窗口<span class="regexp">/新窗口 f/</span>F</span><br><span class="line">查找历史记录+书签   o/O</span><br><span class="line">关闭<span class="regexp">/恢复标签 x/</span>X</span><br><span class="line">查找书签  b<span class="regexp">/B（当前/</span>新窗口打开）</span><br><span class="line">选择左<span class="regexp">/右标签 J/</span>K</span><br><span class="line">搜索剪贴板关键字 在当前<span class="regexp">/新窗口  p/</span>P</span><br><span class="line">跳转到当前url上一级<span class="regexp">/最高级 gu/g</span>U</span><br><span class="line">创建<span class="regexp">/查看标签页  t/</span>T</span><br><span class="line">将焦点聚集在第一个输入框  gi  (<span class="number">2</span>gi就是第二个输入框)</span><br><span class="line">刷新 r</span><br><span class="line">新标签中打开多个链接   &lt;a-f&gt; 即：alt+f</span><br><span class="line">开/关静音  &lt;a-m&gt;即：alt+m</span><br><span class="line">固定标签栏 &lt;a-p&gt;即 alt+p</span><br><span class="line">上一个标签  ^</span><br></pre></td></tr></table></figure>

<h2 id="不常用快捷键"><a href="#不常用快捷键" class="headerlink" title="不常用快捷键"></a>不常用快捷键</h2><figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line">查找（不支持中文）  /</span><br><span class="line">    向下<span class="regexp">/上查找结果  n/</span>N  (回车后直接打开链接，不用再使用f/F定位)</span><br><span class="line">复制当前链接 yy</span><br><span class="line">新模式 i</span><br><span class="line">查看源码 gs</span><br><span class="line">查看所以快捷键 ?</span><br><span class="line">编辑当前地址栏 g+e<span class="regexp">/E   并在当前/</span>新窗口中打开</span><br><span class="line">复制当前标签页  yt</span><br><span class="line">移动当前标签到左<span class="regexp">/右侧边  &lt;&lt;/</span>&gt;&gt;</span><br><span class="line">滚动到页面最左<span class="regexp">/右边（在有滚动条下才有效果） zH/</span>zL</span><br><span class="line">插入模式  i（可以屏蔽掉vimium快捷键，使其不和网页默认快捷键冲突）</span><br><span class="line">将标签页移动到新窗口  W</span><br><span class="line">创建新标记（可创建多个   m 使用方法</span><br><span class="line">      设置当前<span class="regexp">/全局滚动条位置   m+小/</span>大写字母</span><br><span class="line">      跳转到设置的滚动位置   ~+字母</span><br><span class="line">切换到复制模式 v</span><br></pre></td></tr></table></figure>

<h2 id="其他技巧"><a href="#其他技巧" class="headerlink" title="其他技巧"></a>其他技巧</h2><figure class="highlight javascript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br></pre></td><td class="code"><pre><span class="line">作者：小佐</span><br><span class="line">链接：https:<span class="comment">//www.zhihu.com/question/23483616/answer/246787555</span></span><br><span class="line">来源：知乎</span><br><span class="line">著作权归作者所有。商业转载请联系作者获得授权，非商业转载请注明出处。</span><br><span class="line"></span><br><span class="line">焦点切换</span><br><span class="line">    从地址栏切换回页面  tag</span><br><span class="line">翻页</span><br><span class="line">    下/上一页  ]]  [[  部分网站不支持  可以使用 Shortcut Manager 插件代替</span><br><span class="line">    下一页代码：</span><br><span class="line">        <span class="function"><span class="keyword">function</span> <span class="title">next</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">            <span class="keyword">var</span> a=$(<span class="string">&quot;.cur&quot;</span>).next().find(<span class="string">&quot;a&quot;</span>).attr(<span class="string">&quot;href&quot;</span>);</span><br><span class="line">             <span class="built_in">window</span>.location.assign(a);</span><br><span class="line">        &#125;</span><br><span class="line">        next();</span><br><span class="line">    上一页代码：</span><br><span class="line">        <span class="function"><span class="keyword">function</span> <span class="title">after</span>(<span class="params"></span>)</span>&#123;</span><br><span class="line">            <span class="keyword">var</span> a=$(<span class="string">&quot;.cur&quot;</span>).prev().find(<span class="string">&quot;a&quot;</span>).attr(<span class="string">&quot;href&quot;</span>);</span><br><span class="line">             <span class="built_in">window</span>.location.assign(a);</span><br><span class="line">        &#125;</span><br><span class="line">        after();</span><br><span class="line">自定义搜索引擎</span><br><span class="line">    设置：</span><br><span class="line">        请查看选项：Custom search engines</span><br><span class="line">    使用：</span><br><span class="line">        按b/B打开搜索框，输入搜索引擎关键字+空格</span><br><span class="line">    扩展：</span><br><span class="line">        计算功能</span><br><span class="line">            g (<span class="number">1</span>+<span class="number">2</span>)*<span class="number">3</span>-<span class="number">4</span>=     进入google搜索模式直接输入公式后面加<span class="string">&quot;=&quot;</span>号</span><br><span class="line">打开chrome系统页面</span><br><span class="line">    chrome设置页面</span><br><span class="line">        about:setting</span><br><span class="line">    扩展程序</span><br><span class="line">        about:extensions</span><br><span class="line">    历史(history)，下载(downloads)，书签(bookmarks),建议使用chrome默认快捷键代替</span><br><span class="line">        ctrl+h,ctrl+j,ctrl+shift+o</span><br><span class="line">关于&lt;a-p&gt;,&lt;c-e&gt;</span><br><span class="line">    是emacs中的表示方法，分别指alt+p,ctrl+e</span><br><span class="line">快速定位+复制文本：alt+f,v,hjkl,y四步曲</span><br><span class="line">    alt+f 搜索指定关键字，并定位到起始点</span><br><span class="line">    再按v切换到复制模式</span><br><span class="line">    再使用hjkl控制方向选择范围</span><br><span class="line">    最后y复制</span><br><span class="line">删除/修改命令</span><br><span class="line">    删除指定命令</span><br><span class="line">        unmap j   删除命令j</span><br><span class="line">        unmapAll  删除所有命令</span><br><span class="line">    修改命令（后面的命令参数可以在选择里面打开 show available commands找到）</span><br><span class="line">        map a LinkHints.activateMode  把a定义原来f的功能</span><br><span class="line">        map f scrollPageDown   把f定义成原来d的功能</span><br><span class="line">本地文件中使用vimium</span><br><span class="line">    打开chrome插件设置页面，勾选<span class="string">&quot;允许访问文件网址&quot;</span></span><br></pre></td></tr></table></figure>

  <script type="text/javascript">
    var inputArea = document.querySelector("#search-input")
    var searchOverlayArea = document.querySelector(".search-overlay")

    inputArea.onclick = function() {
      getSearchFile()
      this.onclick = null
    }

    inputArea.onkeydown = function() {
      if(event.keyCode == 13)
        return false
    }

    function openOrHideSearchContent() {
      let isHidden = searchOverlayArea.classList.contains('hidden')
      if (isHidden) {
        searchOverlayArea.classList.remove('hidden')
        document.body.classList.add('hidden')
        // inputArea.focus()
      } else {
        searchOverlayArea.classList.add('hidden')
        document.body.classList.remove('hidden')
      }
    }

    function blurSearchContent(e) {
      if (e.target === searchOverlayArea) {
        openOrHideSearchContent()
      }
    }

    document.querySelector("#search-icon").addEventListener("click", openOrHideSearchContent, false)
    document.querySelector("#search-close-icon").addEventListener("click", openOrHideSearchContent, false)
    searchOverlayArea.addEventListener("click", blurSearchContent, false)

    var searchFunc = function (path, search_id, content_id) {
      'use strict';
      var $input = document.getElementById(search_id);
      var $resultContent = document.getElementById(content_id);
      $resultContent.innerHTML = "<ul><span class='local-search-empty'>First search, index file loading, please wait...<span></ul>";
      $.ajax({
        // 0x01. load xml file
        url: path,
        dataType: "xml",
        success: function (xmlResponse) {
          // 0x02. parse xml file
          var datas = $("entry", xmlResponse).map(function () {
            return {
              title: $("title", this).text(),
              content: $("content", this).text(),
              url: $("url", this).text()
            };
          }).get();
          $resultContent.innerHTML = "";

          $input.addEventListener('input', function () {
            // 0x03. parse query to keywords list
            var str = '<ul class=\"search-result-list\">';
            var keywords = this.value.trim().toLowerCase().split(/[\s\-]+/);
            $resultContent.innerHTML = "";
            if (this.value.trim().length <= 0) {
              return;
            }
            // 0x04. perform local searching
            datas.forEach(function (data) {
              var isMatch = true;
              var content_index = [];
              if (!data.title || data.title.trim() === '') {
                data.title = "Untitled";
              }
              var orig_data_title = data.title.trim();
              var data_title = orig_data_title.toLowerCase();
              var orig_data_content = data.content.trim().replace(/<[^>]+>/g, "");
              var data_content = orig_data_content.toLowerCase();
              var data_url = data.url;
              var index_title = -1;
              var index_content = -1;
              var first_occur = -1;
              // only match artiles with not empty contents
              if (data_content !== '') {
                keywords.forEach(function (keyword, i) {
                  index_title = data_title.indexOf(keyword);
                  index_content = data_content.indexOf(keyword);

                  if (index_title < 0 && index_content < 0) {
                    isMatch = false;
                  } else {
                    if (index_content < 0) {
                      index_content = 0;
                    }
                    if (i == 0) {
                      first_occur = index_content;
                    }
                    // content_index.push({index_content:index_content, keyword_len:keyword_len});
                  }
                });
              } else {
                isMatch = false;
              }
              // 0x05. show search results
              if (isMatch) {
                str += "<li><a href='" + data_url + "' class='search-result-title'>" + orig_data_title + "</a>";
                var content = orig_data_content;
                if (first_occur >= 0) {
                  // cut out 100 characters
                  var start = first_occur - 20;
                  var end = first_occur + 80;

                  if (start < 0) {
                    start = 0;
                  }

                  if (start == 0) {
                    end = 100;
                  }

                  if (end > content.length) {
                    end = content.length;
                  }

                  var match_content = content.substr(start, end);

                  // highlight all keywords
                  keywords.forEach(function (keyword) {
                    var regS = new RegExp(keyword, "gi");
                    match_content = match_content.replace(regS, "<span class=\"search-keyword\">" + keyword + "</span>");
                  });

                  str += "<p class=\"search-result-abstract\">" + match_content + "...</p>"
                }
                str += "</li>";
              }
            });
            str += "</ul>";
            if (str.indexOf('<li>') === -1) {
              return $resultContent.innerHTML = "<ul><span class='local-search-empty'>No result<span></ul>";
            }
            $resultContent.innerHTML = str;
          });
        },
        error: function(xhr, status, error) {
          $resultContent.innerHTML = ""
          if (xhr.status === 404) {
            $resultContent.innerHTML = "<ul><span class='local-search-empty'>The search.xml file was not found, please refer to：<a href='https://github.com/zchengsite/hexo-theme-oranges#configuration' target='_black'>configuration</a><span></ul>";
          } else {
            $resultContent.innerHTML = "<ul><span class='local-search-empty'>The request failed, Try to refresh the page or try again later.<span></ul>";
          }
        }
      });
      $(document).on('click', '#search-close-icon', function() {
        $('#search-input').val('');
        $('#search-result').html('');
      });
    }

    var getSearchFile = function() {
        var path = "/search.xml";
        searchFunc(path, 'search-input', 'search-result');
    }
  </script>




    </div>
  </body>
</html>
