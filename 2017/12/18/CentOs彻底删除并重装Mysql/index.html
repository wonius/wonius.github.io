      <div class="markdown-body">
        <h3 id="删除Mysql"><a href="#删除Mysql" class="headerlink" title="删除Mysql"></a>删除Mysql</h3><figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line"><span class="regexp">//</span>备份数据</span><br><span class="line">mysqldump -u xxx -h xxx -P <span class="number">3306</span> -p --all-databases &gt; databases.sql</span><br><span class="line">mysqldump -u xxx -h xxx -P <span class="number">3306</span> -p *** &gt; ***.sql</span><br><span class="line"></span><br><span class="line"><span class="regexp">//</span>停止服务</span><br><span class="line">service mysqld stop</span><br><span class="line"></span><br><span class="line"><span class="regexp">//</span>卸载相关软件</span><br><span class="line">yum remove mysql mysql-*</span><br><span class="line"></span><br><span class="line"><span class="regexp">//</span>找到遗留文件，并删除</span><br><span class="line">find / -name mysql</span><br><span class="line">sudo rm -rf **</span><br><span class="line"></span><br><span class="line"><span class="regexp">//</span>找到依赖包，并卸载</span><br><span class="line">rpm -qa| grep mysql</span><br><span class="line">yum remove ***</span><br></pre></td></tr></table></figure>



<h3 id="重装Mysql"><a href="#重装Mysql" class="headerlink" title="重装Mysql"></a>重装Mysql</h3><figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="regexp">//</span>重新安装</span><br><span class="line">yum install mysql mysql-server mysql-libs</span><br></pre></td></tr></table></figure>



<h3 id="升级高版本Mysql"><a href="#升级高版本Mysql" class="headerlink" title="升级高版本Mysql"></a>升级高版本Mysql</h3><figure class="highlight jboss-cli"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br></pre></td><td class="code"><pre><span class="line"><span class="string">//</span>查看系统信息，el版本、i686还是x86——64等</span><br><span class="line">uname -r</span><br><span class="line"></span><br><span class="line"><span class="string">//</span>到镜像中找适合自己的镜像，拿到链接</span><br><span class="line">http:<span class="string">//mirrors.sohu.com/mysql/</span></span><br><span class="line"></span><br><span class="line"><span class="string">//</span>下载镜像<span class="params">(适合我系统的镜像)</span></span><br><span class="line">weget http:<span class="string">//mirrors.sohu.com/mysql/MySQL-5.7/mysql-5.7.18-1.el6.x86_64.rpm-bundle.tar</span></span><br><span class="line"></span><br><span class="line"><span class="string">//</span>下载后解压</span><br><span class="line">tar xvf mysql-5.7.18-1.el6.x86_64.rpm-bundle.tar</span><br><span class="line"></span><br><span class="line"><span class="string">//</span>依次安装服务</span><br><span class="line">yum localinstall mysql-***-common-***<span class="string">.rpm</span> mysql-***-libs-***<span class="string">.rpm</span> mysql-***-client-***<span class="string">.rmp</span> mysql-***-server-***<span class="string">.rpm</span></span><br><span class="line"></span><br><span class="line"><span class="string">//</span>查看mysql版本</span><br><span class="line">mysql -V</span><br><span class="line"></span><br><span class="line"><span class="string">//</span>启动mysql</span><br><span class="line">service mysqld start</span><br><span class="line"></span><br><span class="line"><span class="string">//</span>查看root用户初始密码</span><br><span class="line">grep &#x27;temporary password&#x27; <span class="string">/var/log/mysqld.log</span>  <span class="params">(或/root/.mysql_secret)</span></span><br><span class="line"></span><br><span class="line"><span class="string">//</span>使用密码登录之后，用下面命令修改密码</span><br><span class="line">ALTER USER ‘root&#x27;@&#x27;localhost&#x27; IDENTIFIED BY &#x27;你的密码&#x27;</span><br><span class="line"></span><br><span class="line"><span class="string">//</span>将Mysql加到服务自启动</span><br><span class="line">chkconfig mysqld on</span><br></pre></td></tr></table></figure>

  <script type="text/javascript">
    var inputArea = document.querySelector("#search-input")
    var searchOverlayArea = document.querySelector(".search-overlay")

    inputArea.onclick = function() {
      getSearchFile()
      this.onclick = null
    }

    inputArea.onkeydown = function() {
      if(event.keyCode == 13)
        return false
    }

    function openOrHideSearchContent() {
      let isHidden = searchOverlayArea.classList.contains('hidden')
      if (isHidden) {
        searchOverlayArea.classList.remove('hidden')
        document.body.classList.add('hidden')
        // inputArea.focus()
      } else {
        searchOverlayArea.classList.add('hidden')
        document.body.classList.remove('hidden')
      }
    }

    function blurSearchContent(e) {
      if (e.target === searchOverlayArea) {
        openOrHideSearchContent()
      }
    }

    document.querySelector("#search-icon").addEventListener("click", openOrHideSearchContent, false)
    document.querySelector("#search-close-icon").addEventListener("click", openOrHideSearchContent, false)
    searchOverlayArea.addEventListener("click", blurSearchContent, false)

    var searchFunc = function (path, search_id, content_id) {
      'use strict';
      var $input = document.getElementById(search_id);
      var $resultContent = document.getElementById(content_id);
      $resultContent.innerHTML = "<ul><span class='local-search-empty'>First search, index file loading, please wait...<span></ul>";
      $.ajax({
        // 0x01. load xml file
        url: path,
        dataType: "xml",
        success: function (xmlResponse) {
          // 0x02. parse xml file
          var datas = $("entry", xmlResponse).map(function () {
            return {
              title: $("title", this).text(),
              content: $("content", this).text(),
              url: $("url", this).text()
            };
          }).get();
          $resultContent.innerHTML = "";

          $input.addEventListener('input', function () {
            // 0x03. parse query to keywords list
            var str = '<ul class=\"search-result-list\">';
            var keywords = this.value.trim().toLowerCase().split(/[\s\-]+/);
            $resultContent.innerHTML = "";
            if (this.value.trim().length <= 0) {
              return;
            }
            // 0x04. perform local searching
            datas.forEach(function (data) {
              var isMatch = true;
              var content_index = [];
              if (!data.title || data.title.trim() === '') {
                data.title = "Untitled";
              }
              var orig_data_title = data.title.trim();
              var data_title = orig_data_title.toLowerCase();
              var orig_data_content = data.content.trim().replace(/<[^>]+>/g, "");
              var data_content = orig_data_content.toLowerCase();
              var data_url = data.url;
              var index_title = -1;
              var index_content = -1;
              var first_occur = -1;
              // only match artiles with not empty contents
              if (data_content !== '') {
                keywords.forEach(function (keyword, i) {
                  index_title = data_title.indexOf(keyword);
                  index_content = data_content.indexOf(keyword);

                  if (index_title < 0 && index_content < 0) {
                    isMatch = false;
                  } else {
                    if (index_content < 0) {
                      index_content = 0;
                    }
                    if (i == 0) {
                      first_occur = index_content;
                    }
                    // content_index.push({index_content:index_content, keyword_len:keyword_len});
                  }
                });
              } else {
                isMatch = false;
              }
              // 0x05. show search results
              if (isMatch) {
                str += "<li><a href='" + data_url + "' class='search-result-title'>" + orig_data_title + "</a>";
                var content = orig_data_content;
                if (first_occur >= 0) {
                  // cut out 100 characters
                  var start = first_occur - 20;
                  var end = first_occur + 80;

                  if (start < 0) {
                    start = 0;
                  }

                  if (start == 0) {
                    end = 100;
                  }

                  if (end > content.length) {
                    end = content.length;
                  }

                  var match_content = content.substr(start, end);

                  // highlight all keywords
                  keywords.forEach(function (keyword) {
                    var regS = new RegExp(keyword, "gi");
                    match_content = match_content.replace(regS, "<span class=\"search-keyword\">" + keyword + "</span>");
                  });

                  str += "<p class=\"search-result-abstract\">" + match_content + "...</p>"
                }
                str += "</li>";
              }
            });
            str += "</ul>";
            if (str.indexOf('<li>') === -1) {
              return $resultContent.innerHTML = "<ul><span class='local-search-empty'>No result<span></ul>";
            }
            $resultContent.innerHTML = str;
          });
        },
        error: function(xhr, status, error) {
          $resultContent.innerHTML = ""
          if (xhr.status === 404) {
            $resultContent.innerHTML = "<ul><span class='local-search-empty'>The search.xml file was not found, please refer to：<a href='https://github.com/zchengsite/hexo-theme-oranges#configuration' target='_black'>configuration</a><span></ul>";
          } else {
            $resultContent.innerHTML = "<ul><span class='local-search-empty'>The request failed, Try to refresh the page or try again later.<span></ul>";
          }
        }
      });
      $(document).on('click', '#search-close-icon', function() {
        $('#search-input').val('');
        $('#search-result').html('');
      });
    }

    var getSearchFile = function() {
        var path = "/search.xml";
        searchFunc(path, 'search-input', 'search-result');
    }
  </script>
